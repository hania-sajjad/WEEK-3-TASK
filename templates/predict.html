<!DOCTYPE html>
<html>

<head>

    <title>Prediction</title>

<nav>

<a href="/">Home</a>

<a href="/dashboard">Dashboard</a>

<a href="/predict">Prediction</a>

</nav>

<h1>Steel Industry Energy Consumption Prediction</h1>

<p style="text-align:center;color:#555;">
Enter the required information below to estimate the predicted
energy consumption using the trained Random Forest model.
</p>

    <style>

        body{
            font-family:Arial, Helvetica, sans-serif;
            background:#f4f6f8;
            margin:0;
        }

        nav{
            background:#2c3e50;
            padding:15px;
            text-align:center;
        }

        nav a{
            color:white;
            text-decoration:none;
            margin:20px;
            font-weight:bold;
        }

        nav a:hover{
            color:#f1c40f;
        }

        h1{
            text-align:center;
            margin-top:30px;
            color:#2c3e50;
        }

        form{
            width:900px;
            margin:30px auto;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.15);
        }

        .grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:20px;
        }

        .field{
            display:flex;
            flex-direction:column;
        }

        label{
            font-weight:bold;
            margin-bottom:6px;
        }

        input,select{
            padding:10px;
            font-size:15px;
        }

        button{
            margin-top:30px;
            width:100%;
            padding:14px;
            background:#2c3e50;
            color:white;
            border:none;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#34495e;
        }

        .result{
            width:900px;
            margin:20px auto;
            background:#d4edda;
            color:#155724;
            text-align:center;
            padding:20px;
            border-radius:8px;
            font-size:24px;
            font-weight:bold;
        }

    </style>

</head>

<body>



<form action="/predict" method="post">

<div class="grid">

<div class="field">
<label>Lagging Reactive Power (kVarh)</label>
<input type="number" step="any" name="lagging_reactive" required>
</div>

<div class="field">
<label>Leading Reactive Power (kVarh)</label>
<input type="number" step="any" name="leading_reactive" required>
</div>

<div class="field">
<label>CO₂ (tCO₂)</label>
<input type="number" step="any" name="co2" required>
</div>

<div class="field">
<label>Lagging Power Factor</label>
<input type="number" step="any" name="lagging_pf" required>
</div>

<div class="field">
<label>Leading Power Factor</label>
<input type="number" step="any" name="leading_pf" required>
</div>

<div class="field">
<label>NSM</label>
<input type="number" name="nsm" required>
</div>

<div class="field">
<label>Hour</label>
<input type="number" min="0" max="23" name="hour" required>
</div>

<div class="field">
<label>Month</label>
<input type="number" min="1" max="12" name="month" required>
</div>

<div class="field">
<label>Power Factor Ratio</label>
<input type="number" step="any" name="power_factor_ratio" required>
</div>

<div class="field">
<label>High Load</label>
<select name="high_load">
<option value="0">No</option>
<option value="1">Yes</option>
</select>
</div>

<div class="field">
<label>Week Status</label>
<select name="week_status">
<option>Weekday</option>
<option>Weekend</option>
</select>
</div>

<div class="field">
<label>Day of Week</label>
<select name="day_of_week">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
<option>Saturday</option>
<option>Sunday</option>
</select>
</div>

<div class="field">
<label>Load Type</label>
<select name="load_type">
<option>Light Load</option>
<option>Medium Load</option>
<option>Maximum Load</option>
</select>
</div>

<div class="field">
<label>Day Type</label>
<select name="day_type">
<option>Weekday</option>
<option>Weekend</option>
</select>
</div>

</div>

<button type="submit">
Predict Energy Consumption
</button>

</form>

{% if prediction is not none %}

<div class="result">

Predicted Energy Consumption

<br><br>

{{ prediction }} kWh

</div>

{% endif %}

</body>

</html>
